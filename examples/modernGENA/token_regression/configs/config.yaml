logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

data:
  train_csv: "examples/modernGENA/data/processed/token_regression/train.csv"
  test_csv: "examples/modernGENA/data/processed/token_regression/test.csv"
  fasta_path: "examples/modernGENA/data/raw/hg38.fa"
  bigwig_path: "examples/modernGENA/data/raw/ENCFF184SOF.bigWig"
  max_length: 1024
  pad_to_multiple_of: 8
  gap_token_id: 5

training:
  output_dir: "runs/modernGENA/token_regression/ctcf_signal"
  resume_from_checkpoint: null

tokenizer:
  _target_: transformers.AutoTokenizer.from_pretrained
  pretrained_model_name_or_path: "AIRI-Institute/moderngena-base"
  trust_remote_code: true

model:
  _target_: examples.modernGENA.token_regression.model.ModernGenaTokenRegressionModel
  pretrained_model_name_or_path: "AIRI-Institute/moderngena-base"
  trust_remote_code: true
  initialize_from_pretrained: true

train_dataset:
  _target_: examples.modernGENA.token_regression.dataset.CTCFTokenRegressionDataset
  intervals_csv: ${data.train_csv}
  fasta_path: ${data.fasta_path}
  bigwig_path: ${data.bigwig_path}
  tokenizer: ${tokenizer}
  max_length: ${data.max_length}
  gap_token_id: ${data.gap_token_id}

test_dataset:
  _target_: examples.modernGENA.token_regression.dataset.CTCFTokenRegressionDataset
  intervals_csv: ${data.test_csv}
  fasta_path: ${data.fasta_path}
  bigwig_path: ${data.bigwig_path}
  tokenizer: ${tokenizer}
  max_length: ${data.max_length}
  gap_token_id: ${data.gap_token_id}

data_collator:
  _target_: transformers.DefaultDataCollator

training_args:
  _target_: transformers.TrainingArguments
  output_dir: ${training.output_dir}
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-5
  weight_decay: 1.0e-3
  num_train_epochs: 5
  lr_scheduler_type: "linear"
  warmup_ratio: 0.06
  logging_steps: 20
  eval_steps: 100
  save_steps: 100
  save_total_limit: 2
  dataloader_num_workers: 2
  dataloader_pin_memory: false
  fp16: false
  bf16: false
  remove_unused_columns: false
  report_to: "tensorboard"
  load_best_model_at_end: true
  metric_for_best_model: "eval_mse"
  greater_is_better: false
  eval_strategy: "steps"
  save_strategy: "steps"
  seed: 42
  label_names: ["labels", "loss_mask"]

callbacks:
  - _target_: transformers.EarlyStoppingCallback
    early_stopping_patience: 30
    early_stopping_threshold: 0.0

trainer:
  _target_: transformers.Trainer
  _convert_: all
  model: ${model}
  args: ${training_args}
  train_dataset: ${train_dataset}
  eval_dataset: ${test_dataset}
  data_collator: ${data_collator}
  callbacks: ${callbacks}
  tokenizer: ${tokenizer}

hydra:
  run:
    dir: .
