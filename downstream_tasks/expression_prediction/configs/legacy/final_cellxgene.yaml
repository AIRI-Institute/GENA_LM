TASK_NAME: expression/final

HOME_PATH: ${oc.env:GENALM_HOME}

MODEL_PATH_ROOT: ${HOME_PATH}/runs/${TASK_NAME}


args_params:

  _target_: builtins.dict
  
  # init_checkpoint: "/workspace-SR003.nfs2/aspeedok/runs/expression/qnorm/qnorm_v1_mouse_large_2seg/20250820-151948/model_best/pytorch_model.bin"

  resume: #"/20251127-022624/model_25000/pytorch_model.bin"

  model_cfg: "./data/configs/L12-H768-A12-V32k-preln.json"

  model_cls: "downstream_tasks.expression_prediction.expression_model_final:ExpressionCounts"

  model_path: ${MODEL_PATH_ROOT}

  clip_grad_norm: 1

  input_seq_len: 1024

  optimizer: "AdamW"

  weight_decay: 1e-4

  seed: 45

  num_warmup_steps: 5000

  log_interval: 100

  valid_interval: 100

  save_best: True

  save_interval: 5000

  optimize_metric: "score_predictions_Expression_dataset_v1_mm10_CPM dataset"

  optimize_mode: "max"

  data_n_workers: 7

  lr: 1e-4

  lr_scheduler: "constant_with_warmup"

  reset_lr: True

  reset_optimizer: True

  reset_iteration: True

  early_stopping_patience: 500000

  iters: 350000

  gen_tokenizer: "AIRI-Institute/gena-lm-bert-base-t2t"

  text_tokenizer: "Qwen/Qwen3-Embedding-0.6B"

 # save_predictions: True

selected_targets_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/datasets/data/ct_specific_benchmark/selected_targets.csv"

model_kwargs:
  _target_: builtins.dict 
  hf: True
  hf_model_name: "${HOME_PATH}/models/modernbert_large"
  hf_model_name_decoder: "${HOME_PATH}/models/decoder6l"
  desc_model_name: "Qwen/Qwen3-Embedding-0.6B"
  
  loss_fct:
    _target_: torch.nn.MSELoss
    reduction: 'none'

  activation:
    _target_: torch.nn.Identity

  config:
    _target_: builtins.dict

  weight: 5

# shared dataset parameters
shared_dataset_params:
  num_before: 512
  n_keys: 13
  gen_tokenizer: ${args_params.gen_tokenizer}
  gen_max_seq_len: ${args_params.input_seq_len}
  text_tokenizer: ${args_params.text_tokenizer}
  text_max_seq_len: 510
  loglevel: 
    "_target_": "logging.getLevelName"
    "level": "DEBUG"
  transform_targets_tpm:
    _target_: downstream_tasks.expression_prediction.expression_dataset_final.logtransform
    pseudocount: 1
  seed: "${args_params.seed}"

train_dataset_human_cellxgene:

  _target_: downstream_tasks.expression_prediction.expression_dataset_final.ExpressionDataset

  forward_intervals_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/intervals/human.cellxgene.train.forward.csv"

  reverse_intervals_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/intervals/human.cellxgene.train.reverse.csv"

  targets_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/datasets/data/cellxgene/file_mappings_human_qref_nozero_id.csv"
  
  genome: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/datasets/data/genomes/hg38/hg38.fa"

  tpm: tpm

train_dataset_mouse_cellxgene:

  _target_: downstream_tasks.expression_prediction.expression_dataset_final.ExpressionDataset

  forward_intervals_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/intervals/mouse.cellxgene.train.forward.csv"

  reverse_intervals_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/intervals/mouse.cellxgene.train.reverse.csv"

  targets_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/datasets/data/cellxgene/file_mappings_mouse_qref_nozero_id.csv"
  
  genome: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/datasets/data/genomes/mm10/mm10.fa"
  
  tpm: tpm

valid_dataset_mouse:
  _target_: downstream_tasks.expression_prediction.expression_dataset_final.ExpressionDataset
  forward_intervals_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/intervals/mouse.valid.forward.csv"
  reverse_intervals_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/intervals/mouse.valid.reverse.csv"
  targets_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/datasets/data/file_mappings/Expression_dataset_v1_CPM_file_mappings_qnorm.csv" 
  genome: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/datasets/data/genomes/mm10/mm10.fa" 
  tpm: CPM
  num_before: 512
  transform_targets_tpm: 
    _target_: downstream_tasks.expression_prediction.expression_dataset_final.logtransform      
    pseudocount: 1


valid_dataset_human:
  _target_: downstream_tasks.expression_prediction.expression_dataset_final.ExpressionDataset
  forward_intervals_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/intervals/human.valid.forward.csv"
  reverse_intervals_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/intervals/human.valid.reverse.csv"
  targets_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/datasets/data/file_mappings/Expression_dataset_v1_csv_file_mappings_qnorm.csv" 
  genome: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/datasets/data/genomes/hg38/hg38.fa" 
  tpm: csv
  num_before: 512 
  transform_targets_tpm:   
    _target_: downstream_tasks.expression_prediction.expression_dataset_final.logtransform        
    pseudocount: 1
