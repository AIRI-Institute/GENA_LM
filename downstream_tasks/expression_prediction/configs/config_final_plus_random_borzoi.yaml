TASK_NAME: expression/final_config

HOME_PATH: ${oc.env:GENALM_HOME}

MODEL_PATH_ROOT: ${HOME_PATH}/runs/${TASK_NAME}


args_params:

  _target_: builtins.dict
  
  # init_checkpoint: "/workspace-SR003.nfs2/aspeedok/runs/expression/qnorm/qnorm_v1_mouse_large_2seg/20250820-151948/model_best/pytorch_model.bin"

  resume: #"/20251127-022624/model_25000/pytorch_model.bin"

  model_cfg: "./data/configs/L12-H768-A12-V32k-preln.json"

  model_cls: "downstream_tasks.expression_prediction.expression_model_final:ExpressionCounts"

  model_path: ${MODEL_PATH_ROOT}

  clip_grad_norm: 1

  input_seq_len: 1024

  optimizer: "AdamW"

  weight_decay: 1e-4

  seed: 45

  num_warmup_steps: 1000

  log_interval: 50

  valid_interval: 50

  save_best: True

  save_interval: 2500

#  optimize_metric: "score_predictions_Expression_dataset_v1_mm10_CPM dataset"

#  optimize_mode: "max"

  data_n_workers: 7

  lr: 1e-4

  lr_scheduler: "constant_with_warmup"

  reset_lr: True

  reset_optimizer: True

  reset_iteration: True

  early_stopping_patience: 500000

  iters: 350000

  hf: False

  gen_tokenizer:  ${HOME_PATH}/GENA_LM/data/tokenizers/t2t_1000h_multi_32k

  text_tokenizer: /beegfs/scratch/ws/ws1/tsoies-Expression/.cache/huggingface/hub/models--Qwen--Qwen3-Embedding-0.6B/snapshots/c54f2e6e80b2d7b7de06f51cec4959f6b3e03418 #"Qwen/Qwen3-Embedding-0.6B"

 # save_predictions: True

selected_targets_path: "${HOME_PATH}/GENA_LM/downstream_tasks/expression_prediction/datasets/data/ct_specific_benchmark/selected_targets.csv"

model_kwargs:
  _target_: builtins.dict 
  hf: False
  hf_model_name: "${HOME_PATH}/GENA_LM/models/modernbert_large"
  hf_model_name_decoder: "${HOME_PATH}/GENA_LM/models/decoderdp0.1"
  desc_model_name: /beegfs/scratch/ws/ws1/tsoies-Expression/.cache/huggingface/hub/models--Qwen--Qwen3-Embedding-0.6B/snapshots/c54f2e6e80b2d7b7de06f51cec4959f6b3e03418
  
  loss_fct:
    _target_: torch.nn.MSELoss
    reduction: 'none'

  activation:
    _target_: torch.nn.Identity

  config:
    _target_: builtins.dict

  weight: 8

# shared dataset parameters
shared_dataset_params:
  gen_tokenizer: ${args_params.gen_tokenizer}
  gen_max_seq_len: ${args_params.input_seq_len}
  text_tokenizer: ${args_params.text_tokenizer}
  text_max_seq_len: 510
  loglevel: 
    "_target_": "logging.getLevelName"
    "level": "DEBUG"
  seed: "${args_params.seed}"


