# keep validation human-only (dataset definition only)
valid_dataset:
  _target_: ${human._target_}
  model_input_length_token: ${human.model_input_length_token}
  av_token_len: ${human.av_token_len}
  path_to_gff_db: ${human.path_to_gff_db}
  path_to_fasta: ${human.path_to_fasta}
  tokenizer: ${human.tokenizer}
  exclude_chromosomes: null
  include_chromosomes: "chr21"
  primary_transcript_types: ${human.primary_transcript_types}
  primary_tags: ${human.primary_tags}
  primary_transcripts_csv: null
  look_up_for_transcript_type_in_parent_gene: ${human.look_up_for_transcript_type_in_parent_gene}
  max_samples_number: 500
  chunk_overlap: ${human.chunk_overlap}
  strand: ${human.strand}


TrainingArguments:
  _target_: transformers.TrainingArguments
  output_dir: ${output_dir}
  per_device_train_batch_size: ${batch_size}
  per_device_eval_batch_size: ${batch_size}
  dataloader_num_workers: 4
  gradient_accumulation_steps:
    _target_: train_with_accelerate.gradient_accumulation_steps
    batch_size: ${batch_size}
    total_batch_size: ${total_batch_size}
  dataloader_pin_memory: false
  remove_unused_columns: false
  load_best_model_at_end: true
  save_strategy: "steps"
  save_total_limit: 2
  eval_strategy: "steps"
  save_steps: 250
  eval_steps: 250
  metric_for_best_model: "eval_loss"
  lr_scheduler_type: "constant"
  num_train_epochs: 10
  logging_steps: 50
  report_to: "tensorboard"

trainer:
  _target_: custom_trainer.CustomTrainer
  model: ${model}
  data_collator:
    _target_: hydra.utils.get_object
    path: simple_annotation_dataset.collate_fn
  train_dataset: ${train_dataset_multispecies}
  eval_dataset: ${valid_dataset}
  args: ${TrainingArguments}
  log_train_metrics: 50
  train_metrics:
    - _target_: custom_trainer.NamedMean
      cls_name: "loss"
    - _target_: custom_trainer.NamedMean
      cls_name: "loss_TSS"
    - _target_: custom_trainer.NamedMean
      cls_name: "loss_polya"
    - _target_: custom_trainer.NamedBinaryAveragePrecision
      cls_name: "primary_tss_+"
    - _target_: custom_trainer.NamedBinaryAveragePrecision
      cls_name: "primary_tss_-"
    - _target_: custom_trainer.NamedBinaryAveragePrecision
      cls_name: "primary_polya_+"
    - _target_: custom_trainer.NamedBinaryAveragePrecision
      cls_name: "primary_polya_-"