HOME_PATH: ${oc.env:GENALM_HOME}
model_cpt: ${oc.env:GENALM_HOME}/runs/annotation/basic/checkpoint-24000/model.safetensors
output_dir: ${oc.env:GENALM_HOME}/runs/annotation/basic/checkpoint-24000/
chromosome: "NC_060944.1"

batch_size: 8

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

model:
  _target_: "annotation_model.ARMT_AnnotationModel"
  output_dir: ${output_dir}
  config: null
  pretrained_cpt: "AIRI-Institute/gena-lm-bert-base-t2t"
  classifier:
    _target_: "annotation_model.Linear_Classifier_with_dropout"
    num_labels: 4
    num_layers: 1
    classifier_dropout: 0.0
  activation:
    _target_: "torch.nn.Identity"
  loss_fct:
    _target_: "annotation_model.WeightedBCEWithLogitsLoss"
    w_nonprimary_exists: 0.0
    w_intergenic: 0.5

  armt_repo_id: "irodkin/armt-neox-tiny"

  base_model_name: ${model.pretrained_cpt}   # uses the same HF id you already pass

  num_mem_tokens: 5
  d_mem: 64
  segment_size: 507
  segment_alignment: "left"
  sliding_window: false
  layers_attr: "bert.encoder.layer"
  wrap_pos: false
  correction: true
  n_heads: 1
  use_denom: true
  gating: false
  freeze_mem: false
  act_on: false

# region: "chr21:13500000-13600000"
# region: "chr21:13500000-20000000"
region: null

eval_dataset:
  _target_: "simple_annotation_dataset.GenomicAnnotationDataset"
  model_input_length_token: 4096
  av_token_len: 9.0
  chunk_overlap: 0.5
  path_to_gff_db: ${HOME_PATH}/data/annotation/GCF_009914755.1_T2T-CHM13v2.0.gff.db
  path_to_fasta: ${HOME_PATH}/data/annotation/T2T-CHM13v2.0_genomic.fna
  tokenizer:
    _target_: "transformers.AutoTokenizer.from_pretrained"
    pretrained_model_name_or_path: "AIRI-Institute/gena-lm-bert-base-t2t"
  exclude_chromosomes: null
  include_chromosomes: ${chromosome}
  primary_transcript_types: ["protein_coding"]
  primary_tags: ["GENCODE_Primary", "MANE_Select"]
  strand: "random"
  drop_last: False

dataloader:
  _target_: "torch.utils.data.DataLoader"
  dataset: ${eval_dataset}
  sampler:
    _target_: evaluate_on_chromosome.SequentialRegionalSampler
    data_source: ${eval_dataset}
    region: ${region}
  batch_size: ${batch_size}
  shuffle: False
  num_workers: 16
  collate_fn:
    _target_: hydra.utils.get_object
    path: evaluate_on_chromosome.identity_fn
  pin_memory: False
  drop_last: False
  timeout: 0
  worker_init_fn:
    _target_: hydra.utils.get_object
    path: simple_annotation_dataset.worker_init_fn